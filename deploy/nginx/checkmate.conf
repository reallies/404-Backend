# Checkmate — Nginx 설정 (Nginx 1.24+, Ubuntu 24.04 기준)
#
# 도메인 발급 후 아래 두 곳을 수정:
#   1. 이 파일의 server_name 을 실제 도메인으로 교체
#   2. certbot --nginx -d <도메인> 실행 → SSL 블록 자동 추가

gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml+rss
    image/svg+xml;

server {
    listen 80;
    listen [::]:80;

    # ── TODO: 도메인 연결 후 실제 도메인으로 교체 ──────────────
    # server_name checkmate.example.com www.checkmate.example.com;
    server_name _;
    # ────────────────────────────────────────────────────────────

    # certbot --webroot 방식 사용 시 필요
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    root /var/www/checkmate;
    index index.html;

    # 정적 자산 장기 캐시 (Vite 빌드는 파일명에 해시 포함)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 백엔드 API 리버스 프록시
    location /api/ {
        proxy_pass         http://localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;  # LLM 체크리스트 생성 응답 대기용
    }

    # SPA 폴백 (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    client_max_body_size 5m;

    # 보안 헤더 (HTTPS 전환 후 HSTS 추가)
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
}

