services:
  postgres:
    image: postgres:16-alpine
    container_name: checkmate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: checkmate
      POSTGRES_PASSWORD: checkmate
      POSTGRES_DB: checkmate
      TZ: Asia/Seoul
    ports:
      - '5432:5432'
    volumes:
      - checkmate_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U checkmate -d checkmate']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: checkmate-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - checkmate_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  checkmate_pg_data:
  checkmate_redis_data:
